name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python (pinned via .python-version)
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format (check)
        run: uv run ruff format --check .

      - name: mypy (strict)
        run: uv run mypy src/ --strict

      - name: deptry (unused / missing deps)
        run: uv run deptry .

      - name: vulture (dead code)
        run: uv run vulture src/ --min-confidence 80

      - name: radon (cyclomatic complexity — fail on rank C+)
        run: uv run radon cc src/ -a --no-assert -nc

      - name: pytest (with coverage XML)
        run: uv run pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: ecosystem_schemas
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: pip-audit
        run: uv run pip-audit --strict
        continue-on-error: false
